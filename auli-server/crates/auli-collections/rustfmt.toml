# .rustfmt.toml
#
# Stable-only config: every option here is honored by the stable toolchain, so
# plain `cargo fmt` is this crate's reproducible formatter (no nightly needed).

# Core settings
edition = "2024"           # Match your Cargo.toml edition
style_edition = "2024"     # Use the latest formatting rules

max_width = 100            # Most projects use 100 (default is 100)
hard_tabs = false
tab_spaces = 4

# Import sorting
reorder_imports = true

# Formatting style
newline_style = "Unix"
use_small_heuristics = "Default"   # Good balance for width
