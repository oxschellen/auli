[package]
name = "auli-scraper-mt"
version = "0.1.0"
edition = "2024"

# Scraper da SEFAZ-MT (serviços, "Catálogo de Serviços do X-Via Portal" — SPA React). SEM headless,
# SEM token: a listagem por órgão vem da API pública `POST /v1/search/department` (anônima, sem
# Keycloak — o `#error=login_required` do shell é ruído do silent-SSO). Cada item já traz descrição
# rica inline, categoria (classe) e `targets` (públicos), então NÃO há chamada de detalhe. Depende
# de auli-contract + o kit — nunca de fastembed/ort. Decisões D-MT1..5 em auli_pendencias.md / PR.
[dependencies]
auli-contract = { path = "../../auli-contract" }
auli-scraper-kit = { path = "../auli-scraper-kit" }
ureq = { version = "3", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1"
