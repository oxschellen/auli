[package]
name = "auli-scraper-rr"
version = "0.1.0"
edition = "2024"

# Scraper da SEFAZ-RR (serviços, www.sefaz.rr.gov.br — site custom). SEM headless: o portal não tem
# catálogo server-rendered, mas o `script.js` embute um array `const apps = [{category, title,
# description, href}, …]` (molde AP) — 20 entradas, 16 hrefs distintos. Público = category
# (Cidadão/Empresa); descrição = a linha do `description`; link = href. Decisões em descoberta-rr.md.
[dependencies]
auli-contract = { path = "../../auli-contract" }
auli-scraper-kit = { path = "../auli-scraper-kit" }
ureq = "3"           # tipo do Agent devolvido por kit::build_agent (GET simples)
anyhow = "1"
regex = "1"          # parse do array `apps` no bundle JS
