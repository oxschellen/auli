[package]
name = "auli-scraper-ro"
version = "0.1.0"
edition = "2024"

# Scraper da SEFIN-RO (serviços, "Agência Virtual" — SPA Sydle ONE, geração "conecta-360" = MESMO
# contrato do PI, NÃO do CE). SEM headless: a listagem vem do método público `_search` (GET,
# ElasticSearch) sobre a classe de conteúdo, filtrando o catálogo "Serviços". Token Bearer anônimo é
# extraído fresh do shell da Agência Virtual a cada rodada (efêmero). Depende de auli-contract + o
# kit — nunca de fastembed/ort. Decisões em descoberta-ro.md.
[dependencies]
auli-contract = { path = "../../auli-contract" }
auli-scraper-kit = { path = "../auli-scraper-kit" }
ureq = { version = "3", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1"
