[package]
name = "auli-scraper-sp"
version = "0.1.0"
edition = "2024"

# Scraper da SEFAZ-SP (serviços, catálogo SharePoint via REST `_api` anônimo — JSON). SEM
# headless_chrome e sem parser HTML (as descrições do card são texto puro). Depende de auli-contract
# + o kit — nunca de fastembed/ort.
[dependencies]
auli-contract = { path = "../../auli-contract" }
auli-scraper-kit = { path = "../auli-scraper-kit" }
ureq = { version = "3", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1"
