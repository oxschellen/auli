# .rustfmt.toml

# Core settings
edition = "2024"           # Match your Cargo.toml edition
style_edition = "2024"     # Use the latest formatting rules

max_width = 100            # Most projects use 100 (default is 100)
hard_tabs = false
tab_spaces = 4

# Import sorting (very useful)
reorder_imports = true
imports_granularity = "Crate"      # or "Module" if you prefer finer grouping
group_imports = "StdExternalCrate"

# Formatting style
newline_style = "Unix"
use_small_heuristics = "Default"   # Good balance for width

# Comments
wrap_comments = true
comment_width = 80
normalize_comments = true
format_code_in_doc_comments = true

# Trailing commas (modern Rust style)
trailing_comma = "Vertical"

# Function and struct formatting
fn_single_line = false
struct_lit_single_line = false
empty_item_single_line = true